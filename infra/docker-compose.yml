# =============================================================================
# CareerStack — local development infrastructure
# =============================================================================
# Brings up the backing services the app + worker need locally:
#   - postgres : PostgreSQL 16 with the pgvector extension
#   - redis    : Redis 7 (BullMQ queues + per-domain rate limiter)
#   - minio    : S3-compatible object store (raw artifact storage)
#   - minio-setup : one-shot job that bootstraps the artifact bucket
#
# Usage (from repo root or this directory):
#   docker compose -f infra/docker-compose.yml up -d
#   docker compose -f infra/docker-compose.yml down
#
# Environment values are read from the repo-root `.env` (see `.env.example`).
# Each variable has an inline default so the stack also runs with no .env file.
# `version:` is intentionally omitted (obsolete in Compose v2).
# =============================================================================

name: careerstack

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: careerstack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careerstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careerstack}
      POSTGRES_DB: ${POSTGRES_DB:-careerstack}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready` returns 0 only once Postgres accepts connections.
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-careerstack} -d ${POSTGRES_DB:-careerstack}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: careerstack-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: careerstack-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-careerstack}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-careerstack-secret}
    ports:
      - '${MINIO_API_PORT:-9000}:9000' # S3 API
      - '${MINIO_CONSOLE_PORT:-9001}:9001' # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot bucket bootstrap. Exits 0 once the artifact bucket exists.
  minio-setup:
    image: minio/mc:latest
    container_name: careerstack-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-careerstack}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-careerstack-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-careerstack-artifacts}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing \"local/$${MINIO_BUCKET}\" &&
      echo \"bucket $${MINIO_BUCKET} ready\";
      "
    restart: 'no'

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
